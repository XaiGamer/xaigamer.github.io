<!DOCTYPE html>
<html>
  <head>
    <title>XaiGamer's Inbox</title>
    <link rel="stylesheet" href="https://aadenboy.github.io/tecknar/src/colorpicker.min.css" />
    <script src="https://aadenboy.github.io/tecknar/src/colorpicker.iife.min.js"></script>
    <script src="https://aadenboy.github.io/tecknar/src/pako.min.js"></script>
    <script src="https://aadenboy.github.io/tecknar/src/tecknar.js"></script>
    <link rel="stylesheet" href="https://aadenboy.github.io/tecknar/src/tecknar.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <nav>
      <ul>
        <li><span>my songs here soon!</span></li>
      </ul>
    </nav>
    <main>
      <h1>XaiGamer's inbox</h1>
      <p>
         thanks aadenboy
      </p>
      <form id="form" method="POST" target="_blank" action="https://docs.google.com/forms/d/e/1FAIpQLSc5LBVQOR1rUiKHU1cNy8Xnx-63aFMHAUTL3_aqtGjah3QxXw/formResponse?usp=pp_url">
        <label>Who are you <input id="identity" type="text" name="entry.589510366" placeholder="No personal info!!!" /></label>
        <textarea id="message" name="entry.488947575" placeholder="say a thing (optional if you draw but then might as well describe the drawing)"></textarea>
        <input type="text" id="canvas-data" name="entry.673886821" style="display: none;" />
        <div id="canvas-area">
          <div id="canvas-container"></div>
        </div>
        <button type="submit" id="submit">submit</button>
      </form>
      <p>Go visit <a href="https://github.com/aadenboy/inbox-template">aadenboy's github!</a> (and maybe even <a href="https://github.com/sponsors/aadenboy">donate to him</a>)</p>
      <noscript>
        <p>This inbox requires that you <a href="https://www.enable-javascript.com/">enable javascript</a> to function properly.</p>
      </noscript>
    </main>
    <script>
      const tecknar = new Tecknar();
      tecknar.mount("#canvas-container");

      const inputs = document.querySelectorAll(".tecknar-container input, .tecknar-container button");
      inputs.forEach((input) => {
        if (input.tagName == "BUTTON") input.setAttribute("type", "button");
        else input.addEventListener("keydown", (e) => {
          if (e.key == "Enter") e.preventDefault();
        });
      });

      const form = document.getElementById("form");
      const submit = document.getElementById("submit");
      const identity = document.getElementById("identity");
      const message = document.getElementById("message");
      const canvas = document.getElementById("canvas-data");

      const emptyData = tecknar.export().data;
      form.addEventListener("submit", (e) => {
        const data = tecknar.export().data;
        if (!message.value && data == emptyData) {
          alert("You need to fill in at least one field.");
          e.preventDefault();
          return;
        }
        canvas.value = data == emptyData ? "" : data;
      });
    </script>
  </body>
</html>
